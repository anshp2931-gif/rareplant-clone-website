<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Rare Planet Clone</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-section {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(255, 249, 243, 0.8), rgba(255, 249, 243, 0.8)), url('https://images.unsplash.com/photo-1590483736622-39da8af75bba?q=80&w=2000&auto=format&fit=crop') center/cover;
        }

        .login-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .login-card p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: var(--font-body);
        }

        .btn-block {
            width: 100%;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        .social-login {
            margin-top: 30px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .social-icons i {
            font-size: 1.5rem;
            color: var(--primary);
            cursor: pointer;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">RARE PLANET</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="deals.html">Deals & Offers</a></li>
                <li><a href="order-status.html">Order Status</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
            <div class="nav-actions">
                <i class="fa-solid fa-cart-shopping btn-icon"></i>
            </div>
        </div>
    </nav>

    <div class="login-section">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p>Login to your Rare Planet account</p>
            <form>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password">
                </div>
                <button type="submit" class="btn-primary btn-block">Sign In</button>
            </form>
            <div class="social-login">
                <p>Or continue with</p>
                <div class="social-icons">
                    <i class="fa-brands fa-google"></i>
                    <i class="fa-brands fa-facebook"></i>
                    <i class="fa-brands fa-apple"></i>
                </div>
            </div>
            <p style="margin-top: 20px; font-size: 0.85rem;">Don't have an account? <a href="#"
                    style="color: var(--primary); font-weight: 600;">Sign Up</a></p>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Rare Planet Clone. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

</body>

</html>
